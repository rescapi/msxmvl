# msxmvl — compile and RUN every documentation example on a real emulator.
# Toolchain is just SDCC + openMSX (openMSX bundles the free C-BIOS), so no copyrighted ROMs.
# The DOS examples are not run here: they need an MSX-DOS/Nextor boot disk that cannot ship.
# Their sources are published and were verified locally; run_all.sh does not include them.
#
# Speed: the ~100 openMSX boots (MSX2 + MSX1) dominate, so —
#  * host job (always): host golden tests + the drift guard, and it decides whether the
#    emulator suite is even needed. PRs that only touch host tools or docs stop here (~15s).
#  * emulator job: sharded 4 ways (run_all.sh round-robins by SHARD_INDEX/SHARD_TOTAL), so
#    a full run is ~4x faster in wall-clock. Skipped entirely for host-tool/docs-only PRs.
#  * examples job: a stable aggregate check (branch protection targets this one name).
#  * no post-merge re-run on main (a squash-merge reproduces the tree the PR already tested);
#    use the manual "Run workflow" button for an on-demand full run.
name: examples
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
jobs:
  host:
    runs-on: ubuntu-latest
    outputs:
      need_emu: ${{ steps.detect.outputs.need_emu }}
    steps:
      - uses: actions/checkout@v4

      - name: Decide whether the emulator suite is needed
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Run the full emulator suite UNLESS every changed file is a host-side tool or a
          # doc/markdown file — those are covered by the host golden tests + drift guard
          # here. Manual runs go full. Fail safe to "true" if the file list is unavailable.
          need=true
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(gh api --paginate \
              "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
              -q '.[].filename' || true)
            if [ -n "$files" ]; then
              need=false
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                case "$f" in
                  tools/*.py|docs/examples/*_test.py|docs/*.md|docs/reports/*|NOTICE.md|README.md|LICENSE) ;;
                  *) need=true ;;
                esac
              done <<< "$files"
            fi
            echo "changed files:"; echo "$files"
          fi
          echo "need_emu=$need" >> "$GITHUB_OUTPUT"
          echo "emulator suite needed: $need"

      - name: Install Pillow (host golden tests)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends python3-pil

      - name: Asset-pipeline host tools — golden tests
        run: cd docs/examples && bash run_tools.sh

      - name: Documentation drift guard (docs match tested examples)
        run: cd docs/examples && bash verify_docs.sh

  emulator:
    needs: host
    if: needs.host.outputs.need_emu == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      SDL_VIDEODRIVER: dummy      # headless: no window, no audio device
      SHARD_TOTAL: 4
      SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v4

      - name: Install SDCC + openMSX
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends sdcc openmsx

      - name: Sanity — C-BIOS bootable (shard 0)
        if: matrix.shard == 0
        run: |
          sdcc --version | head -1
          command -v makebin
          timeout 25 openmsx -machine C-BIOS_MSX2 -command "after time 2 { exit 0 }" \
            || { echo "::error::C-BIOS_MSX2 machine not available in this openMSX"; exit 1; }

      - name: Documentation examples — MSX2 (shard ${{ matrix.shard }}/4)
        run: cd docs/examples && bash run_all.sh

      - name: Documentation examples — MSX1 (shard ${{ matrix.shard }}/4)
        run: cd docs/examples && bash run_all_msx1.sh

      - name: Banking examples — ASCII-8/16 MegaROMs (shard 0)
        if: matrix.shard == 0
        run: |
          for d in examples/banking/*/; do
            [ -f "$d/run.sh" ] || continue
            echo "== $d"
            bash "$d/run.sh"
          done

  # Stable aggregate status for branch protection: one check named "examples" that is
  # green iff the host checks passed and the emulator suite passed or was skipped.
  examples:
    needs: [host, emulator]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          echo "host=${{ needs.host.result }}  emulator=${{ needs.emulator.result }}"
          [ "${{ needs.host.result }}" = "success" ] || { echo "::error::host checks failed"; exit 1; }
          case "${{ needs.emulator.result }}" in
            success|skipped) ;;
            *) echo "::error::emulator suite failed (${{ needs.emulator.result }})"; exit 1 ;;
          esac
          echo "OK"
